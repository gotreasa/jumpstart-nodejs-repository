name: SonarCloud NodeJs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commitlint:
    if: github.actor != 'dependabot[bot]'
    name: Verify commits are linted
    runs-on: ubuntu-latest
    steps:
      - name: 🪪 Check if it's Dependabot's PR
        run: |
          echo "The github actor is '${{ github.actor }}'"
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed

  eslint-verify:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout the code
        uses: actions/checkout@main
      - uses: actions/setup-node@main
        with:
          node-version: 22.16
          cache: 'npm'
      - name: 🗂️ Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}
      - run: npm ci --ignore-scripts
      - name: Lint the code
        run: npm run lint:verify --
          --format @microsoft/eslint-formatter-sarif
          --output-file eslint-results.sarif
        continue-on-error: true
      - name: Upload analysis results to GitHub
        if: github.actor != 'dependabot[bot]'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true

  prettier-verify:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout the code
        uses: actions/checkout@main
      - uses: actions/setup-node@main
        with:
          node-version: 22.16
          cache: 'npm'
      - name: 🗂️ Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}
      - run: npm ci --ignore-scripts
      - name: Prettify the code
        run: npm run prettier:verify

  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout the code
        uses: actions/checkout@main
      - uses: actions/setup-node@main
        with:
          node-version: 22.16
          cache: 'npm'
      - name: 🗂️ Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}
      - run: npm ci --ignore-scripts
      - name: Detect any secrets in the code
        run: npm run detect-secrets $(git ls-files)

  test_and_coverage:
    runs-on: ubuntu-latest
    needs: [eslint-verify, prettier-verify, detect-secrets]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@main
        with:
          node-version: 22.16
          cache: 'npm'
      - name: 🗂️ Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}
      - run: npm ci --ignore-scripts
      - name: Run Tests
        run: npm test
      - name: SonarCloud Scan
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2
        if: success() || failure() # run this step even if previous step failed
        with:
          name: JEST Tests # Name of the check run which will be created
          path: reports/jest-junit.xml* # Path to test results
          reporter: jest-junit # Format of test results
      - name: Publish Test Report
        if: always() # Forces this step to always run
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
        with:
          report_paths: 'reports/jest-junit.xml*'
          require_tests: true
          check_name: Jest Results

  mutation_test:
    runs-on: ubuntu-latest
    needs: [eslint-verify, prettier-verify, detect-secrets]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@main
        with:
          node-version: 22.16
          cache: 'npm'
      - name: 🗂️ Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}
      - run: npm ci --ignore-scripts
      - name: Run Tests
        run: npm run test:mutation

  # ============================================================
  # Dependabot auto-merge (consolidated — no separate workflow)
  # ============================================================

  dependabot_auto_merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: [eslint-verify, prettier-verify, test_and_coverage, mutation_test]
    permissions:
      contents: write
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Auto-merge patch and minor updates
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
